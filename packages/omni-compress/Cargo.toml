[package]
name = "omni-compress"
version = "0.1.0"
edition = "2021"
description = "Universal compressor in WASM"
repository = "https://github.com/dharanish-v/omni-compress"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
photon-rs = "0.3"
console_error_panic_hook = "0.1.7"
zip = { version = "0.6", default-features = false, features = ["deflate"] }
flate2 = "1.0"
js-sys = "0.3"