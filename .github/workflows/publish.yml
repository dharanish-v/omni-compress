name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Install Playwright Browsers
        working-directory: packages/omni-compress
        run: bunx playwright install --with-deps chromium
      - name: Type Check
        working-directory: packages/omni-compress
        run: bun run typecheck
      - name: Run Tests
        working-directory: packages/omni-compress
        run: bun run test
      - name: Build Library
        working-directory: packages/omni-compress
        run: bun run build
      - name: Publish omni-compress to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_VERSION=$(node -p "require('./packages/omni-compress/package.json').version")
          PUBLISHED=$(npm show omni-compress@$PKG_VERSION version 2>/dev/null || echo "")
          if [ -z "$PUBLISHED" ]; then
            npm publish -w omni-compress --access public --provenance
          else
            echo "omni-compress@$PKG_VERSION already published — skipping"
          fi
      - name: Build vite-plugin-omni-compress
        working-directory: packages/vite-plugin-omni-compress
        run: bun run build
      - name: Publish vite-plugin-omni-compress to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_VERSION=$(node -p "require('./packages/vite-plugin-omni-compress/package.json').version")
          PUBLISHED=$(npm show vite-plugin-omni-compress@$PKG_VERSION version 2>/dev/null || echo "")
          if [ -z "$PUBLISHED" ]; then
            npm publish -w vite-plugin-omni-compress --access public --provenance
          else
            echo "vite-plugin-omni-compress@$PKG_VERSION already published — skipping"
          fi
      - name: Build astro-omni-compress
        working-directory: packages/astro-omni-compress
        run: bun run build
      - name: Publish astro-omni-compress to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_VERSION=$(node -p "require('./packages/astro-omni-compress/package.json').version")
          PUBLISHED=$(npm show astro-omni-compress@$PKG_VERSION version 2>/dev/null || echo "")
          if [ -z "$PUBLISHED" ]; then
            npm publish -w astro-omni-compress --access public --provenance
          else
            echo "astro-omni-compress@$PKG_VERSION already published — skipping"
          fi
      - name: Sync @dharanish/omni-compress version
        run: |
          node -e "
            const fs = require('fs');
            const version = require('./packages/omni-compress/package.json').version;
            const proxy = JSON.parse(fs.readFileSync('./packages/omni-compress-proxy/package.json', 'utf8'));
            proxy.version = version;
            proxy.dependencies['omni-compress'] = version;
            fs.writeFileSync('./packages/omni-compress-proxy/package.json', JSON.stringify(proxy, null, 2) + '\n');
          "
      - name: Publish @dharanish/omni-compress to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_VERSION=$(node -p "require('./packages/omni-compress-proxy/package.json').version")
          PUBLISHED=$(npm show @dharanish/omni-compress@$PKG_VERSION version 2>/dev/null || echo "")
          if [ -z "$PUBLISHED" ]; then
            npm publish -w @dharanish/omni-compress --access public --provenance
          else
            echo "@dharanish/omni-compress@$PKG_VERSION already published — skipping"
          fi
      - name: Deprecate @dharanish/omni-compress
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm deprecate "@dharanish/omni-compress" "Renamed to 'omni-compress'. Please update: npm install omni-compress"
