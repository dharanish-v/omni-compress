name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Type Check
        working-directory: packages/omni-compress
        run: bun run typecheck
      - name: Build Library
        working-directory: packages/omni-compress
        run: bun run build
      - name: Publish to NPM
        working-directory: packages/omni-compress
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          bun publish --access public
        env:
          NPM_CONFIG_PROVENANCE: true
