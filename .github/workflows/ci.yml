name: CI & Playground Deployment

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Browsers
        working-directory: packages/omni-compress
        run: bunx playwright install --with-deps chromium

      - name: Type Check
        working-directory: packages/omni-compress
        run: bun run typecheck

      - name: Run Tests
        working-directory: packages/omni-compress
        run: bun run test --coverage
        
      - name: Build Library
        run: cd packages/omni-compress && bun run build

      - name: Build Playground
        run: cd apps/playground && bun run build
        env:
          NODE_ENV: production

      - name: Upload artifact
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './apps/playground/dist'

  deploy_pages:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    needs: build_and_deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
